# golangci-lint v2 configuration.
version: "2"

run:
  modules-download-mode: readonly

linters:
  # Start from nothing and opt in, preserving the project's curated set
  # (mapped to their v2 names: golint -> revive, gomnd -> mnd; the abandoned
  # deadcode/varcheck/structcheck/scopelint/interfacer/maligned are folded into
  # unused / govet and dropped).
  default: none
  enable:
    - dupl
    - errcheck
    - errorlint
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - mnd
    - nakedret
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - wrapcheck
  settings:
    errcheck:
      check-type-assertions: true
    gocyclo:
      min-complexity: 10
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30
    nolintlint:
      require-specific: true
      allow-unused: false
    staticcheck:
      # Honour the project's historical stance of skipping stylecheck (ST) and
      # quickfix (QF) suggestions; keep the SA bug checks and S simplifications.
      checks:
        - all
        - -ST*
        - -QF*
  exclusions:
    generated: lax
    paths:
      - example
      - dummyout
    rules:
      # Exported-identifier comment rule is noise inside the internal pkg tree.
      - path: pkg
        text: "should have comment or be unexported"
        linters:
          - revive
      # Repeated literals in table-driven tests are expected, not constants.
      - path: _test\.go
        linters:
          - goconst

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
